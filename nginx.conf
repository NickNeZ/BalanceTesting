events {}
http {
    upstream backend {
#        least_conn;
#        ip_hash;
#        random;
        server app1:8080;
        server app2:8080 max_fails=2 fail_timeout=15s;
        server app3:8080;
    }

    server {
        listen 80;
        server_name localhost;
        location / {
            proxy_pass http://backend;
        }
    }

}

